name: CI

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  # Cancel older runs for the same branch or PR so the latest result wins.
  group: ci-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  static-checks:
    name: Static checks (Python 3.14)
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Check out repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@83679a892e2d95755f2dac6acb0bfd1e9ac5d548 # v6.1.0
        with:
          python-version: "3.14"

      - name: Set up uv
        uses: astral-sh/setup-uv@5a095e7a2014a4212f075830d4f7277575a9d098 # v7
        with:
          version: "0.10.8"
          enable-cache: true

      - name: Sync development dependencies
        run: uv sync --locked --extra dev

      - name: Run Ruff
        run: uv run ruff check .

      - name: Run mypy
        run: uv run mypy app tests scripts/evaluate_normalization.py

  security-checks:
    name: Security checks (Python 3.14)
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Check out repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@83679a892e2d95755f2dac6acb0bfd1e9ac5d548 # v6.1.0
        with:
          python-version: "3.14"

      - name: Set up uv
        uses: astral-sh/setup-uv@5a095e7a2014a4212f075830d4f7277575a9d098 # v7
        with:
          version: "0.10.8"
          enable-cache: true

      - name: Sync development dependencies
        run: uv sync --locked --extra dev

      - name: Run Bandit
        run: uv run bandit -q -r app scripts/evaluate_normalization.py

  test:
    name: Test (${{ matrix.os }}, Python ${{ matrix.python-version }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 10
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - macos-latest
        python-version:
          - "3.14"

    steps:
      - name: Check out repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@83679a892e2d95755f2dac6acb0bfd1e9ac5d548 # v6.1.0
        with:
          python-version: ${{ matrix.python-version }}

      - name: Set up uv
        uses: astral-sh/setup-uv@5a095e7a2014a4212f075830d4f7277575a9d098 # v7
        with:
          version: "0.10.8"
          enable-cache: true

      - name: Sync development dependencies
        run: uv sync --locked --extra dev

      - name: Run tests
        run: uv run pytest

      - name: Run normalization evaluation
        run: uv run python -m app evaluate-normalization --json-output ./.tmp/normalization-eval.json

      - name: Run CLI smoke checks
        run: |
          uv run python -m app --help
          uv run python -m app poller --help
          uv run python -m app dispatcher --help
          uv run python -m app evaluate-normalization
          uv run python -m app --config lobsterhook.example.toml init-db
